<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}App{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Phosphor Icons for modern icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="background-mesh">
        <div class="blob purple"></div>
        <div class="blob cyan"></div>
    </div>
    
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash-msg flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        
        <div class="glass-panel form-container">
            {% block content %}{% endblock %}
        </div>
    </div>
    
    <!-- Add some Javascript for simple interactions if needed -->
    <script>
        // Simple script to auto-hide flash messages after 3 seconds
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const flashes = document.querySelectorAll('.flash-msg');
                flashes.forEach(flash => {
                    flash.style.opacity = '0';
                    setTimeout(() => flash.remove(), 500);
                });
            }, 3000);
        });
    </script>
</body>
</html>
