{% extends "base.html" %}

{% block title %}Register - Modern Dark App{% endblock %}

{% block content %}
<div class="form-header stagger-1">
    <h2>Create Account</h2>
    <p>Join us today to get started.</p>
</div>

<form action="{{ url_for('register') }}" method="POST" class="auth-form">
    <div class="input-group stagger-2">
        <label for="username">Username</label>
        <div class="input-wrapper">
            <i class="ph ph-user"></i>
            <input type="text" id="username" name="username" placeholder="johndoe" required>
        </div>
    </div>

    <div class="input-group stagger-2">
        <label for="email">Email</label>
        <div class="input-wrapper">
            <i class="ph ph-envelope"></i>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>
    </div>
    
    <div class="input-group stagger-3">
        <label for="password">Password</label>
        <div class="input-wrapper">
            <i class="ph ph-lock"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
    </div>

    <div class="input-group stagger-3">
        <label for="confirm_password">Confirm Password</label>
        <div class="input-wrapper">
            <i class="ph ph-check-circle"></i>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary stagger-4">Sign Up</button>
    
    <div class="form-footer stagger-5">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign In</a></p>
    </div>
</form>
{% endblock %}
