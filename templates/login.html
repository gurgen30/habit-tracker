{% extends "base.html" %}

{% block title %}Login - Modern Dark App{% endblock %}

{% block content %}
<div class="form-header stagger-1">
    <h2>Welcome Back</h2>
    <p>Sign in to continue to your account.</p>
</div>

<form action="{{ url_for('login') }}" method="POST" class="auth-form">
    <div class="input-group stagger-2">
        <label for="email">Email</label>
        <div class="input-wrapper">
            <i class="ph ph-envelope"></i>
            <input type="email" id="email" name="email" placeholder="name@example.com" required>
        </div>
    </div>
    
    <div class="input-group stagger-3">
        <div class="label-row">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <div class="input-wrapper">
            <i class="ph ph-lock"></i>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary stagger-4">Sign In</button>
    
    <div class="form-footer stagger-5">
        <p>Don't have an account? <a href="{{ url_for('register') }}">Create one</a></p>
    </div>
</form>
{% endblock %}
